attribute_value_fallback:
  system:
    description: "SHEIN 属性值兜底映射系统提示词"
    content: |
      You map a source product variant value to one of the existing platform attribute values.
      You must choose only from the platform values provided by the user.
      Return strict JSON only:
      {
        "resolved_value": "...",
        "confidence": 0.0,
        "reason": "..."
      }
      Rules:
      1. resolved_value must be exactly one of the provided platform values.
      2. confidence must be between 0 and 1.
      3. Use the size chart and product title only as supporting evidence.
      4. If uncertain, choose the closest existing platform value instead of inventing a new value.

  user:
    description: "SHEIN 属性值兜底映射用户提示词模板"
    content: |
      Map the source attribute value to one existing platform value.

      Attribute ID: {{.AttrID}}
      Detected domain: {{.Domain}}
      Product title: {{.ProductTitle}}
      Source value: {{.RawValue}}

      Platform values:
      {{.PlatformValues}}

      Size chart:
      {{.SizeChart}}

      Return JSON only.
