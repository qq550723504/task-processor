sale_attribute:
  source_dimension:
    description: "SHEIN 销售属性源维度预选提示词模板"
    content: |
      You are choosing source sales dimensions for SHEIN draft grouping.
      Choose exactly one preliminary primary_source_dimension and optionally one preliminary secondary_source_dimension from the source data.
      This is only a source-data fallback before the live SHEIN template is known. Do not infer the final SHEIN primary sale attribute here.
      Do not rename source dimensions. Prefer stable, structured, non-technical source dimensions over prompt text or identifiers.
      Return JSON only with keys primary_source_dimension, secondary_source_dimension, reasons.

      Source dimensions:
      {{.SourceDimensionsBlock}}

  mapping:
    description: "SHEIN 销售属性源维度映射提示词模板"
    content: |
      You map source sales dimensions to SHEIN sale attributes.
      Use the SHEIN sale attribute templates in the exact order shown.
      The first template is the primary SKC sale attribute target. A template with primary_label=true is the authoritative SHEIN primary sale attribute and must be treated as first even if other fields look more variant-distinguishing.
      The next usable template is the secondary SKU sale attribute target.
      Choose at most one primary_source_dimension for the first template and at most one secondary_source_dimension for the next template.
      Keep source dimension names unchanged. Do not choose the most variant-distinguishing source as primary unless it maps to the first SHEIN template.
      When the first SHEIN template has no exact same-name source dimension, choose the structured source dimension whose meaning and values are the safest stable surrogate for that target attribute.
      If the first template is Style Type / 款式 and the source has only Color and Size, Size usually belongs to the later Size template; choose the safest non-size structured source as the Style Type surrogate when semantically safe.
      Do not invent source dimensions, do not use user free-form prompts, and avoid technical ids.
      Do not reorder SHEIN templates based on source dimension names; map source dimensions onto the template order.
      primary_attribute_id must equal the first SHEIN template attribute_id. secondary_attribute_id must equal the next selected SHEIN template attribute_id.
      If there is no safe secondary mapping, leave secondary_source_dimension empty.
      Return JSON only with keys primary_source_dimension, secondary_source_dimension, primary_attribute_id, secondary_attribute_id, reasons.

      Source dimensions:
      {{.SourceDimensionsBlock}}

      SHEIN sale attribute templates:
      {{.TemplatesBlock}}

      {{.FeedbackBlock}}

  value_batch_mapping:
    description: "SHEIN 销售属性枚举值批量映射提示词模板"
    content: |
      You map source sales values to one existing SHEIN template attribute value.
      Work only inside the provided candidate list from SHEIN. Do not invent a new value.
      For each source_value, choose one candidate attribute_value_id only when the semantic match is safe.
      If none is safe, set attribute_value_id to 0.
      Ignore packaging words, material words, feature words, weight notes, and decorative prefixes when the actual color/size/style meaning is still clear.
      Return JSON only with shape {"matches":[{"source_value":"...","attribute_value_id":123,"reasons":["..."]}],"reasons":["..."]}.

      Source dimension: {{.SourceDimension}}
      SHEIN template attribute: {{.TemplateAttribute}}
      Source values:
      {{.SourceValuesBlock}}

      Candidates:
      {{.CandidatesBlock}}

  prompt_value_extraction:
    description: "从图片生成提示词中提取安全销售属性值的提示词模板"
    content: |
      You extract a short e-commerce sale attribute value from a noisy image-generation prompt.
      Return JSON only with shape {"value":"...","reasons":["..."]}.
      Rules:
      1. Output one short English attribute value only.
      2. Do not output sentences, commands, copyright notes, size/canvas instructions, or punctuation-heavy text.
      3. Prefer 2-6 words and under 50 characters.
      4. Keep theme/style semantics when obvious, but do not invent detailed marketing copy.

      Attribute name: {{.AttributeName}}
      Source dimension: {{.SourceDimension}}
      Product title: {{.ProductTitle}}
      Prompt-like source value: {{.SourceValue}}
