studio_generation:
  pod_design:
    description: "Studio AI POD print design prompt"
    content: |
      Create a single print-ready graphic for ecommerce POD or customized-product use.
      Return a flat design only, not a product mockup, not a model photo, not a scene photo, and not a physical product rendering.
      Keep the composition centered and marketplace-safe, with strong readability at print size.
      Avoid extra scene elements outside the artwork itself.
      Optimize for real POD production methods such as printing, heat-transfer, engraving, or surface customization when applicable.
      Use bold, clean shapes and clear silhouette separation.
      Avoid tiny text, dense paragraphs, micro details, thin outlines, delicate line art, halftone noise, and scattered miniature elements.
      Avoid weak low-contrast details, photographic scenes, and edge-to-edge clutter.
      Do not draw checkerboard patterns, grey-white transparency grids, PNG preview backgrounds, alpha-channel previews, or fake cutout-background indicators.
      Use an intentional solid or simple clean background if background space is needed; never simulate transparency.
      {{.ReferenceHint}}
      If typography is used, keep it minimal, large, legible, and secondary to the main graphic.
      Favor one strong focal concept with simple layering and enough negative space.
      {{.PrintableHint}}
      Theme prompt: {{.ThemePrompt}}

  amazon_product_image:
    description: "Studio AI product image prompt aligned to Amazon image requirements"
    content: |
      Create one Amazon-compliant ecommerce product image that can also be reused for marketplace listings.
      Use AI to create the final product presentation directly; do not use an SDS mockup or template.
      The first input image is the approved POD artwork and is the authoritative design source.
      Preserve the approved artwork's exact visual identity: same main subject, layout, colors, typography, symbols, relative positions, and overall composition.
      Do not redesign, reinterpret, simplify, replace, translate, add to, or remove elements from the approved artwork.
      Use the SDS product reference images only as product shape, material, scale, color-variant, lighting, and context references.
      Preserve the product type and physical form from the SDS references; do not invent a different product.
      Blend the approved artwork onto or into the product presentation naturally, but keep the artwork recognizable as the same design across every generated image.
      Use a square 1:1 composition suitable for marketplace upload.
      The product must be the clear primary subject, sharply focused, realistic, and accurately scaled.
      Do not add watermarks, brand marks, marketplace logos, borders, UI chrome, QR codes, price tags, or promotional badges.
      Text and icons are allowed only when the image role explicitly asks for them or the user provided role-specific text instructions.
      When text is used, keep it short, high contrast, marketplace-safe, and never covering the product or human subject.
      Avoid showing multiple unrelated products or unavailable variants.
      For the main-image role, use a pure white RGB(255,255,255) background, no text, no logo, no watermark, no shadow, no reflection, and show the full product without crop.
      For the dimension role, use only accurate SDS-provided dimensions or SDS size reference mockups. Do not invent measurements. If exact dimensions are available in cm/mm/in, convert accurately and display inches only.
      For the character-scene role, include a person only if the actual SDS product is naturally worn, held, used, or demonstrated by a person; otherwise create a non-human product scene.
      Make the image look like a professional Amazon listing asset, not a social media ad.
      Image {{.ImageIndex}} of {{.ImageTotal}}.
      Image role: {{.ImageRoleLabel}}.
      Role goal: {{.ImageGoal}}
      Composition guidance: {{.ImageComposition}}
