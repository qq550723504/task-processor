# Amazon 产品属性映射配置

# 产品类型定义
product_types:
  # 标准产品类型
  PRODUCT:
    display_name: "标准产品"
    required_attributes:
      - item_name              # 产品名称
      - brand                  # 品牌
      - manufacturer           # 制造商
      - product_description    # 产品描述
    optional_attributes:
      - color                  # 颜色
      - size                   # 尺寸
      - material_type          # 材质
      - item_weight            # 重量
      - item_dimensions        # 尺寸
      - package_dimensions     # 包装尺寸
      - model_number           # 型号
      - part_number            # 零件号
      - item_package_quantity  # 包装数量
      - country_of_origin      # 原产国
      - warranty_description   # 保修说明
      - care_instructions      # 护理说明
      - special_features       # 特殊功能
      - target_audience        # 目标受众
      - age_range_description  # 适用年龄
      - style                  # 风格
      - pattern                # 图案
      - season                 # 季节
      - occasion               # 场合
      - theme                  # 主题

  # 服装类产品
  CLOTHING:
    display_name: "服装"
    required_attributes:
      - item_name
      - brand
      - manufacturer
      - product_description
      - department             # 部门（男装/女装/童装）
      - size_map               # 尺码表
    optional_attributes:
      - color
      - size
      - material_type
      - fabric_type            # 面料类型
      - care_instructions
      - fit_type               # 版型
      - style_name             # 款式名称
      - pattern_type           # 图案类型
      - sleeve_type            # 袖型
      - collar_style           # 领型
      - closure_type           # 闭合方式
      - waist_style            # 腰部款式
      - rise_style             # 裤腰高度
      - inseam                 # 内缝长度
      - neck_style             # 领口款式
      - occasion_type          # 场合类型
      - season_year            # 季节年份

  # 电子产品
  ELECTRONICS:
    display_name: "电子产品"
    required_attributes:
      - item_name
      - brand
      - manufacturer
      - product_description
      - model_number
    optional_attributes:
      - color
      - size
      - item_weight
      - item_dimensions
      - battery_type           # 电池类型
      - battery_capacity       # 电池容量
      - voltage                # 电压
      - wattage                # 功率
      - connectivity_technology # 连接技术
      - compatible_devices     # 兼容设备
      - operating_system       # 操作系统
      - memory_storage_capacity # 存储容量
      - screen_size            # 屏幕尺寸
      - resolution             # 分辨率
      - processor_type         # 处理器类型
      - ram_size               # 内存大小
      - wireless_type          # 无线类型
      - connector_type         # 连接器类型
      - cable_length           # 线缆长度
      - warranty_description

# 属性映射规则
# 从1688数据字段映射到 Amazon 属性
attribute_mappings:
  # 标题映射（1688字段：subject, title）
  item_name:
    source_fields:
      - subject          # 1688主标题
      - title
      - productName
      - name
    max_length: 200
    required: true
    
  # 品牌映射（1688可能没有品牌字段）
  brand:
    source_fields:
      - brand
      - brandName
      - manufacturer
    max_length: 50
    required: true
    default: "Generic"
    
  # 制造商映射
  manufacturer:
    source_fields:
      - manufacturer
      - brand
      - supplierName     # 1688供应商名称
      - companyName
    max_length: 50
    required: true
    
  # 描述映射（1688字段：description, detailDesc）
  product_description:
    source_fields:
      - description
      - detailDesc       # 1688详细描述
      - productDesc
      - desc
    max_length: 2000
    required: true
    
  # 颜色映射（1688字段：color, skuProps中的颜色）
  color:
    source_fields:
      - color
      - colour
      - colorName
    max_length: 50
    
  # 尺寸映射（1688字段：size, skuProps中的尺码）
  size:
    source_fields:
      - size
      - sizeName
      - spec
    max_length: 50
    
  # 材质映射（1688字段：material）
  material_type:
    source_fields:
      - material
      - materialType
      - fabric
      - texture
    max_length: 100
    
  # 重量映射（1688字段：weight，单位可能是kg）
  item_weight:
    source_fields:
      - weight
      - netWeight
      - grossWeight
    unit: "pounds"
    
  # 型号映射（1688字段：model, productCode）
  model_number:
    source_fields:
      - model
      - modelNumber
      - productCode
      - itemNumber
    max_length: 50
    
  # 原产国映射（1688通常是中国）
  country_of_origin:
    source_fields:
      - countryOfOrigin
      - originCountry
      - madeIn
    max_length: 50
    default: "CN"

# 属性值转换规则
value_transformations:
  # 颜色标准化
  color:
    "红色": "Red"
    "蓝色": "Blue"
    "绿色": "Green"
    "黑色": "Black"
    "白色": "White"
    "灰色": "Gray"
    "黄色": "Yellow"
    "粉色": "Pink"
    "紫色": "Purple"
    "橙色": "Orange"
    "棕色": "Brown"
    
  # 尺寸标准化
  size:
    "特小": "XS"
    "小": "S"
    "中": "M"
    "大": "L"
    "特大": "XL"
    "加大": "XXL"
    
  # 材质标准化
  material_type:
    "棉": "Cotton"
    "聚酯纤维": "Polyester"
    "尼龙": "Nylon"
    "丝绸": "Silk"
    "羊毛": "Wool"
    "皮革": "Leather"
    "金属": "Metal"
    "塑料": "Plastic"
    "木材": "Wood"
    "玻璃": "Glass"

# 验证规则
validation_rules:
  item_name:
    min_length: 1
    max_length: 200
    pattern: "^[^<>]*$"  # 不允许 HTML 标签
    
  brand:
    min_length: 1
    max_length: 50
    
  product_description:
    min_length: 10
    max_length: 2000
    
  color:
    max_length: 50
    allowed_values:
      - Red
      - Blue
      - Green
      - Black
      - White
      - Gray
      - Yellow
      - Pink
      - Purple
      - Orange
      - Brown
      - Multi
      - Other
      
  size:
    max_length: 50
    
  item_weight:
    min_value: 0.01
    max_value: 1000
    unit: pounds
    
  model_number:
    max_length: 50
    pattern: "^[A-Za-z0-9-_]+$"

# 默认值配置
default_values:
  manufacturer: "Generic"
  country_of_origin: "CN"
  item_package_quantity: 1
  warranty_description: "Manufacturer Warranty"
