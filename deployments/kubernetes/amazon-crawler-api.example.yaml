apiVersion: v1
kind: Namespace
metadata:
  name: task-processor
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: amazon-crawler-api-config
  namespace: task-processor
data:
  config-amazon-crawler-api.yaml: |
    logging:
      level: "INFO"
      format: "text"
      file: ""
      split_by_level: []

    browser:
      enabled: true
      headless: true
      browserPath: "/usr/bin/chromium"
      poolSize: 4
      viewportWidth: 1920
      viewportHeight: 1080
      proxyServer: ""

    amazon:
      enabled: true
      dataFreshnessDays: 15
      crawlTimeout: 300
      productDedupe:
        lockTTLSeconds: 300
        resultTTLSeconds: 600
        waitTimeoutSeconds: 120
        pollIntervalMillis: 500
      failureArtifacts:
        enabled: true
        directory: "./tmp/amazon-failure-artifacts"
        captureHTML: true
        maxHTMLBytes: 262144
      riskControl:
        captchaRecreateThreshold: 1
        authenticationRecreateThreshold: 1
        browserCrashRecreateThreshold: 1
        timeoutRecreateThreshold: 3
        networkRecreateThreshold: 2
        serverErrorRecreateThreshold: 3
      regionGuard:
        enabled: true
        failureThreshold: 3
        evaluationWindowSeconds: 300
        cooldownSeconds: 180
      qualityControl:
        retryOnValidationFailure: true
        validationRetryMaxAttempts: 2
      proxyPool:
        enabled: false
        strategy: "round_robin"
        failureCooldownSeconds: 300
        proxies: []
      concurrencyControl:
        enabled: false
        maxInFlight: 12
        maxWaiting: 50
        acquireTimeoutSeconds: 20
        perRegion: {}
      remoteAPI:
        enabled: false
        baseURL: ""
        timeout: 300
      zipcodes:
        us: "10001"
        uk: "SW1A1AA"
        de: "10115"
        fr: "75001"
        it: "00118"
        es: "28001"
        ca: "M5V2T6"
        jp: "1000001"

    rabbitmq:
      enabled: false

    redis:
      host: "redis-master.default.svc.cluster.local"
      port: 6379
      password: ""
      db: 0
      pool_size: 10

    platforms:
      temu:
        enabled: false
        schedulerEnabled: false
      shein:
        enabled: false
        schedulerEnabled: false
      alibaba1688:
        enabled: false
        timeout: 120
        poolSize: 2

    updater:
      enabled: false
---
apiVersion: v1
kind: Secret
metadata:
  name: amazon-crawler-api-secret
  namespace: task-processor
type: Opaque
stringData:
  TASK_PROCESSOR_AMAZON_SPAPI_CLIENT_ID: "replace-me"
  TASK_PROCESSOR_AMAZON_SPAPI_CLIENT_SECRET: "replace-me"
  TASK_PROCESSOR_AMAZON_SPAPI_REFRESH_TOKEN: "replace-me"
  TASK_PROCESSOR_AMAZON_SPAPI_REGION: "us-east-1"
  TASK_PROCESSOR_AMAZON_SPAPI_DEFAULT_MARKETPLACE: "ATVPDKIKX0DER"
  TASK_PROCESSOR_AMAZON_SPAPI_DEFAULT_FULFILLMENT_TYPE: "MFN"
  TASK_PROCESSOR_AMAZON_SPAPI_DEFAULT_CONDITION: "New"
  TASK_PROCESSOR_OPENAI_API_KEY: "replace-me"
  TASK_PROCESSOR_OPENAI_MODEL: "gemini-2.0-flash"
  TASK_PROCESSOR_OPENAI_BASE_URL: "https://ai.linkcloudai.com/v1"
  TASK_PROCESSOR_MANAGEMENT_BASE_URL: "http://management-api.default.svc.cluster.local:8080"
  TASK_PROCESSOR_MANAGEMENT_CLIENT_ID: "go-listing"
  TASK_PROCESSOR_MANAGEMENT_CLIENT_SECRET: "replace-me"
  TASK_PROCESSOR_MANAGEMENT_TOKEN_URL: "http://management-api.default.svc.cluster.local:8080/admin-api/system/oauth2/token"
  TASK_PROCESSOR_MANAGEMENT_TENANT_ID: "1"
  TASK_PROCESSOR_REDIS_HOST: "redis-master.default.svc.cluster.local"
  TASK_PROCESSOR_REDIS_PORT: "6379"
  TASK_PROCESSOR_REDIS_PASSWORD: ""
  TASK_PROCESSOR_REDIS_DB: "0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amazon-crawler-api
  namespace: task-processor
  labels:
    app: amazon-crawler-api
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: amazon-crawler-api
  template:
    metadata:
      labels:
        app: amazon-crawler-api
    spec:
      containers:
        - name: amazon-crawler-api
          image: xuwei190/task-processor-amazon-crawler-api:latest
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /app/config/config-amazon-crawler-api.yaml
            - -port
            - "8080"
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: TASK_PROCESSOR_ENV
              value: prod
            - name: TASK_PROCESSOR_BROWSER_HEADLESS
              value: "true"
            - name: TASK_PROCESSOR_BROWSER_PATH
              value: /usr/bin/chromium
          envFrom:
            - secretRef:
                name: amazon-crawler-api-secret
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 18
          volumeMounts:
            - name: app-config
              mountPath: /app/config/config-amazon-crawler-api.yaml
              subPath: config-amazon-crawler-api.yaml
            - name: app-tmp
              mountPath: /app/tmp
            - name: app-logs
              mountPath: /app/logs
      volumes:
        - name: app-config
          configMap:
            name: amazon-crawler-api-config
        - name: app-tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: amazon-crawler-api
  namespace: task-processor
  labels:
    app: amazon-crawler-api
spec:
  selector:
    app: amazon-crawler-api
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: amazon-crawler-api
  namespace: task-processor
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: amazon-crawler-api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: amazon-crawler-api
                port:
                  number: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: amazon-crawler-api
  namespace: task-processor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: amazon-crawler-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
