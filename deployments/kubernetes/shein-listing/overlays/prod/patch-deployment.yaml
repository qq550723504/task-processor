apiVersion: apps/v1
kind: Deployment
metadata:
  name: shein-listing
  namespace: task-processor
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: shein-listing
          resources:
            requests:
              cpu: "1"
              memory: "256Mi"
            limits:
              cpu: "3"
              memory: "1Gi"
