apiVersion: apps/v1
kind: Deployment
metadata:
  name: shein-listing
  namespace: task-processor
spec:
  replicas: 3
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - ser724424133953-98065f14
      containers:
        - name: shein-listing
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "3"
              memory: "1Gi"
