apiVersion: apps/v1
kind: Deployment
metadata:
  name: shein-listing-store-c
  namespace: task-processor
  labels:
    app: shein-listing-store-c
    shard: store-c
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: shein-listing-store-c
  template:
    metadata:
      labels:
        app: shein-listing-store-c
        shard: store-c
    spec:
      containers:
        - name: shein-listing
          image: xuwei190/task-processor-shein-listing:autoshard-20260410
          imagePullPolicy: Always
          command: ["/app/listing-service"]
          args:
            - -config
            - /app/config/config-shein-listing.yaml
            - -log-level
            - info
          ports:
            - name: http
              containerPort: 8081
            - name: metrics
              containerPort: 8082
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: TASK_PROCESSOR_ENV
              value: prod
            - name: TASK_PROCESSOR_RABBITMQ_NODE_ROLE
              value: task
            - name: TASK_PROCESSOR_RABBITMQ_NODE_NODE_ID
              value: shein-listing-store-c
            - name: TASK_PROCESSOR_RABBITMQ_NODE_USE_STORE_QUEUES
              value: "true"
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_ENABLED
              value: "true"
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_PLATFORM
              value: shein
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_INTERVAL
              value: "30"
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_PAGE_SIZE
              value: "200"
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_LOCK_KEY
              value: listing:queue:auto-shard:lock
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_LOCK_TTL
              value: "25"
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_CANDIDATE_NODES
              value: shein-listing-store-a,shein-listing-store-b,shein-listing-store-c,shein-listing-store-d
            - name: TASK_PROCESSOR_REDIS_DB
              value: "9"
            - name: TASK_PROCESSOR_RABBITMQ_NODE_HEALTH_CHECK_PORT
              value: "8081"
            - name: TASK_PROCESSOR_RABBITMQ_NODE_METRICS_PORT
              value: "8082"
          envFrom:
            - secretRef:
                name: shein-listing-secret
          resources:
            requests:
              cpu: "300m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 36
          volumeMounts:
            - name: app-config
              mountPath: /app/config/config-shein-listing.yaml
              subPath: config-shein-listing.yaml
            - name: app-tmp
              mountPath: /app/tmp
            - name: app-logs
              mountPath: /app/logs
      volumes:
        - name: app-config
          configMap:
            name: shein-listing-config
        - name: app-tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}
