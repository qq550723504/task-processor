apiVersion: apps/v1
kind: Deployment
metadata:
  name: shein-listing-store-865
  namespace: task-processor
  labels:
    app: shein-listing-store-865
    shard: single-store-865
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: shein-listing-store-865
  template:
    metadata:
      labels:
        app: shein-listing-store-865
        shard: single-store-865
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/agent
                    operator: In
                    values: ["true"]
                  - key: task-processor/crawler-tier
                    operator: In
                    values: ["heavy"]
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["ser804638640694-b480450e"]
      containers:
        - name: shein-listing
          image: xuwei190/task-processor-shein-listing:localfetch-pricingfix-20260412-224800
          imagePullPolicy: Always
          command: ["/app/listing-service"]
          args:
            - -config
            - /app/config/config-shein-listing.yaml
            - -log-level
            - info
          ports:
            - name: http
              containerPort: 8081
            - name: metrics
              containerPort: 8082
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: TASK_PROCESSOR_ENV
              value: prod
            - name: TASK_PROCESSOR_RABBITMQ_NODE_NODE_ID
              value: ser804638640694-b480450e
            - name: TASK_PROCESSOR_RABBITMQ_NODE_ROLE
              value: task
            - name: TASK_PROCESSOR_RABBITMQ_NODE_USE_STORE_QUEUES
              value: "true"
            - name: TASK_PROCESSOR_RABBITMQ_NODE_OWNED_STORES
              value: "865"
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_ENABLED
              value: "false"
            - name: TASK_PROCESSOR_REDIS_DB
              value: "9"
            - name: TASK_PROCESSOR_RABBITMQ_NODE_HEALTH_CHECK_PORT
              value: "8081"
            - name: TASK_PROCESSOR_RABBITMQ_NODE_METRICS_PORT
              value: "8082"
          envFrom:
            - secretRef:
                name: shein-listing-secret
          resources:
            requests:
              cpu: "1"
              memory: "2500Mi"
            limits:
              cpu: "3"
              memory: "5Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 36
          volumeMounts:
            - name: app-config
              mountPath: /app/config/config-shein-listing.yaml
              subPath: config-shein-listing.yaml
            - name: app-tmp
              mountPath: /app/tmp
            - name: app-logs
              mountPath: /app/logs
      volumes:
        - name: app-config
          configMap:
            name: shein-listing-config-heavy
        - name: app-tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}

