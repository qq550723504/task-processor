apiVersion: v1
kind: Service
metadata:
  name: shein-listing-shard-headless
  namespace: task-processor
  labels:
    app: shein-listing-shard
spec:
  clusterIP: None
  selector:
    app: shein-listing-shard
  ports:
    - name: http
      port: 8081
      targetPort: http
    - name: metrics
      port: 8082
      targetPort: metrics
