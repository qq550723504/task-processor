apiVersion: apps/v1
kind: Deployment
metadata:
  name: shein-listing-ownership-controller
  namespace: task-processor
  labels:
    app: shein-listing-ownership-controller
    shein-listing-role: ownership-controller
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: shein-listing-ownership-controller
  template:
    metadata:
      labels:
        app: shein-listing-ownership-controller
        shein-listing-role: ownership-controller
        shard-mode: auto
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/agent
                    operator: In
                    values: ["true"]
                  - key: task-processor/crawler-tier
                    operator: In
                    values: ["heavy"]
      containers:
        - name: shein-listing
          image: xuwei190/task-processor-shein-listing:9078f71b-brandblank-20260623-1336
          imagePullPolicy: IfNotPresent
          command: ["/app/listing-service"]
          args:
            - -config
            - /app/config/config-shein-listing.yaml
            - -log-level
            - info
          ports:
            - name: http
              containerPort: 8081
            - name: metrics
              containerPort: 8082
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: TASK_PROCESSOR_ENV
              value: prod
            - name: TASK_PROCESSOR_RABBITMQ_NODE_NODE_ID
              value: shein-listing-ownership-controller
            - name: TASK_PROCESSOR_RABBITMQ_NODE_ROLE
              value: task
            - name: TASK_PROCESSOR_RABBITMQ_NODE_USE_STORE_QUEUES
              value: "false"
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_ENABLED
              value: "true"
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_ROLE
              value: coordinator
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_PLATFORM
              value: shein
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_INTERVAL
              value: "30"
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_PAGE_SIZE
              value: "200"
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_LOCK_KEY
              value: listing:queue:auto-shard:lock
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_LOCK_TTL
              value: "25"
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_CANDIDATE_NODES
              value: shein-listing-shard-0,shein-listing-shard-1,shein-listing-shard-2,shein-listing-shard-3,shein-listing-shard-4,shein-listing-shard-5,shein-listing-shard-6,shein-listing-shard-7,shein-listing-shard-8,shein-listing-shard-9,shein-listing-shard-10,shein-listing-shard-11,shein-listing-shard-12,shein-listing-shard-13,shein-listing-shard-14,shein-listing-shard-15,shein-listing-shard-16,shein-listing-shard-17,shein-listing-shard-18,shein-listing-shard-19
            - name: TASK_PROCESSOR_RABBITMQ_AUTO_SHARD_TARGET_STORES_PER_NODE
              value: "3"
            - name: TASK_PROCESSOR_RABBITMQ_DEAD_LETTER_ENABLED
              value: "true"
            - name: TASK_PROCESSOR_RABBITMQ_DEAD_LETTER_QUEUE_NAME
              value: tasks.dlq
            - name: TASK_PROCESSOR_RABBITMQ_PROCESSING_TIMEOUT_WATCHDOG_ENABLED
              value: "false"
            - name: TASK_PROCESSOR_RABBITMQ_PROCESSING_TIMEOUT_WATCHDOG_INTERVAL_SECONDS
              value: "300"
            - name: TASK_PROCESSOR_RABBITMQ_PROCESSING_TIMEOUT_WATCHDOG_TIMEOUT_MINUTES
              value: "30"
            - name: TASK_PROCESSOR_RABBITMQ_PROCESSING_TIMEOUT_WATCHDOG_RECOVERY_LIMIT
              value: "100"
            - name: TASK_PROCESSOR_RABBITMQ_STALE_QUEUED_WATCHDOG_ENABLED
              value: "false"
            - name: TASK_PROCESSOR_RABBITMQ_STALE_QUEUED_WATCHDOG_INTERVAL_SECONDS
              value: "300"
            - name: TASK_PROCESSOR_RABBITMQ_STALE_QUEUED_WATCHDOG_TIMEOUT_MINUTES
              value: "120"
            - name: TASK_PROCESSOR_RABBITMQ_STALE_QUEUED_WATCHDOG_RECOVERY_LIMIT
              value: "500"
            - name: TASK_PROCESSOR_REDIS_DB
              value: "9"
            - name: TASK_PROCESSOR_RABBITMQ_NODE_HEALTH_CHECK_PORT
              value: "8081"
            - name: TASK_PROCESSOR_RABBITMQ_NODE_METRICS_PORT
              value: "8082"
          envFrom:
            - secretRef:
                name: shein-listing-secret
          resources:
            requests:
              cpu: "1"
              memory: "2500Mi"
            limits:
              cpu: "3"
              memory: "5Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 90
          volumeMounts:
            - name: app-config
              mountPath: /app/config/config-shein-listing.yaml
              subPath: config-shein-listing.yaml
            - name: app-tmp
              mountPath: /app/tmp
            - name: app-logs
              mountPath: /app/logs
      volumes:
        - name: app-config
          configMap:
            name: shein-listing-config-heavy
        - name: app-tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}
