apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shein-listing
  namespace: task-processor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shein-listing
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
