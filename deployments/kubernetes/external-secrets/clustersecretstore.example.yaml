apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: task-processor-secrets
spec:
  provider:
    # Replace this example provider with your secret backend, such as Vault,
    # AWS Secrets Manager, GCP Secret Manager, or Tencent Cloud Secrets Manager.
    vault:
      server: https://vault.example.com
      path: kv
      version: v2
      auth:
        tokenSecretRef:
          name: external-secrets-vault-token
          namespace: external-secrets
          key: token
