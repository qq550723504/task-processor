apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-listingkit-assets
  labels:
    app.kubernetes.io/name: minio
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: ser946874959885-36c99917
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: root-password
          command:
            - /bin/sh
            - -ec
            - |
              until mc alias set local "http://${MINIO_SERVICE_HOST}:9000" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                sleep 2
              done
              mc mb --ignore-existing local/listingkit-assets
              mc anonymous set download local/listingkit-assets
