apiVersion: apps/v1
kind: Deployment
metadata:
  name: amazon-crawler-api
  namespace: task-processor
  labels:
    app: amazon-crawler-api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: amazon-crawler-api
  template:
    metadata:
      labels:
        app: amazon-crawler-api
    spec:
      containers:
        - name: amazon-crawler-api
          image: xuwei190/task-processor-amazon-crawler-api:8324377
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /app/config/config-amazon-crawler-api.yaml
            - -port
            - "8080"
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: TASK_PROCESSOR_ENV
              value: prod
            - name: TASK_PROCESSOR_BROWSER_HEADLESS
              value: "true"
            - name: TASK_PROCESSOR_BROWSER_PATH
              value: /usr/bin/chromium
          envFrom:
            - secretRef:
                name: amazon-crawler-api-secret
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 18
          volumeMounts:
            - name: app-config
              mountPath: /app/config/config-amazon-crawler-api.yaml
              subPath: config-amazon-crawler-api.yaml
            - name: app-tmp
              mountPath: /app/tmp
            - name: app-logs
              mountPath: /app/logs
      volumes:
        - name: app-config
          configMap:
            name: amazon-crawler-api-config
        - name: app-tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}
