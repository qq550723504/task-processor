apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: amazon-crawler-api-secret
  namespace: task-processor
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: task-processor-secrets
  target:
    name: amazon-crawler-api-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: TASK_PROCESSOR_AMAZON_SPAPI_CLIENT_ID
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_AMAZON_SPAPI_CLIENT_ID
    - secretKey: TASK_PROCESSOR_AMAZON_SPAPI_CLIENT_SECRET
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_AMAZON_SPAPI_CLIENT_SECRET
    - secretKey: TASK_PROCESSOR_AMAZON_SPAPI_REFRESH_TOKEN
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_AMAZON_SPAPI_REFRESH_TOKEN
    - secretKey: TASK_PROCESSOR_AMAZON_SPAPI_REGION
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_AMAZON_SPAPI_REGION
    - secretKey: TASK_PROCESSOR_AMAZON_SPAPI_DEFAULT_MARKETPLACE
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_AMAZON_SPAPI_DEFAULT_MARKETPLACE
    - secretKey: TASK_PROCESSOR_AMAZON_SPAPI_DEFAULT_FULFILLMENT_TYPE
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_AMAZON_SPAPI_DEFAULT_FULFILLMENT_TYPE
    - secretKey: TASK_PROCESSOR_AMAZON_SPAPI_DEFAULT_CONDITION
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_AMAZON_SPAPI_DEFAULT_CONDITION
    - secretKey: TASK_PROCESSOR_OPENAI_API_KEY
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_OPENAI_API_KEY
    - secretKey: TASK_PROCESSOR_OPENAI_MODEL
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_OPENAI_MODEL
    - secretKey: TASK_PROCESSOR_OPENAI_BASE_URL
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_OPENAI_BASE_URL
    - secretKey: TASK_PROCESSOR_REDIS_HOST
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_REDIS_HOST
    - secretKey: TASK_PROCESSOR_REDIS_PORT
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_REDIS_PORT
    - secretKey: TASK_PROCESSOR_REDIS_PASSWORD
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_REDIS_PASSWORD
    - secretKey: TASK_PROCESSOR_REDIS_DB
      remoteRef:
        key: task-processor/prod/amazon-crawler-api
        property: TASK_PROCESSOR_REDIS_DB
