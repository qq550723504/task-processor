apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: amazon-crawler-api-heavy
  namespace: task-processor
spec:
  template:
    spec:
      containers:
        - name: amazon-crawler-api
          resources:
            requests:
              cpu: "500m"
              memory: "1500Mi"
            limits:
              cpu: "3000m"
              memory: "4Gi"
