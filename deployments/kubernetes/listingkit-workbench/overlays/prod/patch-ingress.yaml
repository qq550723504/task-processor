apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: listingkit-workbench
spec:
  rules:
    - host: pod.shuomiai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: listingkit-ui
                port:
                  name: http
  tls:
    - hosts:
        - pod.shuomiai.com
      secretName: pod-shuomiai-com-tls
