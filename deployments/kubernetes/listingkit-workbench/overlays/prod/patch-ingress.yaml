apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: listingkit-workbench
spec:
  rules:
    - host: listingkit.shuomiai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: listingkit-ui
                port:
                  name: http
