apiVersion: v1
kind: Secret
metadata:
  name: listingkit-workbench-secret
type: Opaque
stringData:
  # Copy this file to secret.yaml or create the secret with kubectl/SealedSecret.
  # Do not commit real credentials.
  # ZITADEL_* are still consumed directly by the Next.js UI. The Go API loads
  # the same issuer/client credentials through core config binding into
  # listingkit.zitadel.*.
  TASK_PROCESSOR_OPENAI_API_KEY: ""
  TASK_PROCESSOR_OPENAI_CLIENTS_IMAGE_API_KEY: ""
  TASK_PROCESSOR_OPENAI_CLIENTS_IMAGE_API_STYLE: "nanobanana"
  TASK_PROCESSOR_OPENAI_CLIENTS_IMAGE_BASE_URL: "https://grsai.dakka.com.cn/v1/draw/nano-banana"
  TASK_PROCESSOR_OPENAI_CLIENTS_IMAGE_MODEL: "nano-banana-fast"
  TASK_PROCESSOR_NANO_BANANA_API_KEY: ""
  TASK_PROCESSOR_DATABASE_DSN: ""
  TASK_PROCESSOR_RABBITMQ_URL: ""
  TASK_PROCESSOR_S3_ENDPOINT: "https://oss.shuomiai.com"
  TASK_PROCESSOR_S3_BUCKET: "listingkit-assets"
  TASK_PROCESSOR_S3_ACCESS_KEY_ID: ""
  TASK_PROCESSOR_S3_SECRET_ACCESS_KEY: ""
  TASK_PROCESSOR_PRODUCTIMAGE_PUBLISHER_S3_ACCESSKEYID: ""
  TASK_PROCESSOR_PRODUCTIMAGE_PUBLISHER_S3_SECRETACCESSKEY: ""
  # Optional imgproxy signing secret. Leave empty when you use /img/insecure URLs.
  IMGPROXY_KEY: ""
  IMGPROXY_SALT: ""
  TASK_PROCESSOR_SHEIN_APP_ID: ""
  TASK_PROCESSOR_SHEIN_APP_SECRET: ""
  TASK_PROCESSOR_SHEIN_LOGIN_SERVICE_BASE_URL: "http://login.yudao-cloud.svc.cluster.local:8000"
  TASK_PROCESSOR_SHEIN_LOGIN_SERVICE_SHARED_KEY: ""
  TASK_PROCESSOR_SHEIN_LOGIN_SERVICE_TENANT_ID: ""
  TASK_PROCESSOR_SHEIN_LOGIN_SERVICE_IDENTIFIER: ""
  TASK_PROCESSOR_SHEIN_COOKIE_REDIS_HOST: "redis-master.yudao-cloud.svc.cluster.local"
  TASK_PROCESSOR_SHEIN_COOKIE_REDIS_PORT: "6379"
  TASK_PROCESSOR_SHEIN_COOKIE_REDIS_PASSWORD: ""
  TASK_PROCESSOR_SHEIN_COOKIE_REDIS_DB: "9"
  TASK_PROCESSOR_SDS_ACCESS_TOKEN: ""
  TASK_PROCESSOR_SDS_LOGIN_SERVICE_BASE_URL: "http://login.yudao-cloud.svc.cluster.local:8000"
  TASK_PROCESSOR_SDS_LOGIN_SERVICE_SHARED_KEY: ""
  TASK_PROCESSOR_SDS_LOGIN_SERVICE_TENANT_ID: ""
  TASK_PROCESSOR_SDS_LOGIN_SERVICE_IDENTIFIER: ""
  LISTINGKIT_BASIC_AUTH_USERNAME: "admin"
  LISTINGKIT_BASIC_AUTH_PASSWORD: ""
  AUTH_SECRET: ""
  ZITADEL_ISSUER_URL: ""
  ZITADEL_CLIENT_ID: ""
  ZITADEL_CLIENT_SECRET: ""
  # Auth.js callback URI should be https://<workbench-host>/api/auth/callback/zitadel
  ZITADEL_REDIRECT_URI: ""
  ZITADEL_POST_LOGOUT_REDIRECT_URI: ""
  # Optional override. Keep resourceowner if you customize this value.
  ZITADEL_SCOPES: "openid profile email urn:zitadel:iam:user:resourceowner urn:zitadel:iam:org:project:id:zitadel:aud"
  # Optional Go API ListingKit authz toggles. Leave empty to use YAML/configmap
  # defaults; set them here when you want auth behavior to stay with secret
  # material during deployment.
  TASK_PROCESSOR_LISTINGKIT_ZITADEL_AUTH_REQUIRED: "1"
  TASK_PROCESSOR_LISTINGKIT_ZITADEL_AUTHZ_REQUIRED: "1"
  LISTINGKIT_ZITADEL_ALLOWED_ROLES: "listingkit_admin,listingkit_operator,listingkit_viewer,platform_admin"
