apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: listingkit-workbench
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  rules:
    - host: listingkit.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: listingkit-ui
                port:
                  name: http
