apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: listingkit-workbench
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    ingress.kubernetes.io/ssl-redirect: "true"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: listingkit.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: listingkit-ui
                port:
                  name: http
  tls:
    - hosts:
        - listingkit.example.com
      secretName: listingkit-workbench-tls
