apiVersion: v1
kind: ConfigMap
metadata:
  name: listingkit-workbench-config
data:
  LISTINGKIT_API_BASE: "http://product-listing-api:8085/api/v1/listing-kits"
  LISTINGKIT_SERVICE_API_BASE: "http://product-listing-api:8085/api/v1"
  NEXT_TELEMETRY_DISABLED: "1"
  TASK_PROCESSOR_ENV: "prod"
  TASK_PROCESSOR_PRODUCTIMAGE_PUBLISHER_PROVIDER: "s3"
  TASK_PROCESSOR_PRODUCTIMAGE_PUBLISHER_PUBLICBASE: "https://oss.shuomiai.com"
  TASK_PROCESSOR_PRODUCTIMAGE_PUBLISHER_S3_BUCKET: "shuomi-1303159911"
  TASK_PROCESSOR_PRODUCTIMAGE_PUBLISHER_S3_REGION: "ap-hongkong"
  TASK_PROCESSOR_PRODUCTIMAGE_PUBLISHER_S3_ENDPOINT: "https://cos.ap-hongkong.myqcloud.com"
  TASK_PROCESSOR_PRODUCTIMAGE_PUBLISHER_S3_USEPATHSTYLE: "false"
  LISTINGKIT_IMGPROXY_BASE_URL: "https://listingkit.example.com/img"
  NEXT_PUBLIC_LISTINGKIT_IMGPROXY_BASE_URL: "https://listingkit.example.com/img"
  IMGPROXY_BIND: ":8080"
  IMGPROXY_PATH_PREFIX: "/img"
  IMGPROXY_USE_S3: "true"
  IMGPROXY_S3_BUCKET: "shuomi-1303159911"
  IMGPROXY_S3_REGION: "ap-hongkong"
  IMGPROXY_S3_ENDPOINT: "https://cos.ap-hongkong.myqcloud.com"
  IMGPROXY_S3_ENDPOINT_USE_PATH_STYLE: "false"
  IMGPROXY_AUTO_WEBP: "true"
  IMGPROXY_AUTO_AVIF: "true"
  # ListingKit layer workflows and publish workflows run on Temporal when enabled.
  # Replace the address with the real Temporal frontend Service in the cluster.
  LISTINGKIT_TEMPORAL_ENABLED: "1"
  LISTINGKIT_TEMPORAL_ADDRESS: "temporal-frontend.temporal.svc.cluster.local:7233"
  LISTINGKIT_TEMPORAL_NAMESPACE: "default"
  LISTINGKIT_TEMPORAL_START_WORKER: "1"
  # Set ZITADEL_ISSUER_URL and ZITADEL_CLIENT_ID to enable ZITADEL OIDC login.
  # These env vars are bound into Go API core config at listingkit.zitadel.*.
  # The resourceowner scope is required so the Go API can scope ListingKit data by ZITADEL tenant.
  ZITADEL_SCOPES: "openid profile email urn:zitadel:iam:user:resourceowner urn:zitadel:iam:org:project:id:zitadel:aud"
  TASK_PROCESSOR_LISTINGKIT_ZITADEL_AUTH_REQUIRED: "1"
