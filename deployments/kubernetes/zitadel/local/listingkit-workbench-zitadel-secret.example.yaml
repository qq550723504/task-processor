apiVersion: v1
kind: Secret
metadata:
  name: listingkit-workbench-secret
  namespace: task-processor
type: Opaque
stringData:
  # Fill these after creating an OIDC Web application in ZITADEL.
  # The UI reads these values directly. The Go API binds issuer/client
  # credentials from the same env into listingkit.zitadel.* runtime config.
  ZITADEL_ISSUER_URL: "https://auth.shuomiai.com"
  ZITADEL_CLIENT_ID: ""
  ZITADEL_CLIENT_SECRET: ""
  ZITADEL_REDIRECT_URI: "https://pod.shuomiai.com/api/zitadel-auth/callback"
  ZITADEL_POST_LOGOUT_REDIRECT_URI: "https://pod.shuomiai.com"
  ZITADEL_SCOPES: "openid profile email urn:zitadel:iam:user:resourceowner urn:zitadel:iam:org:project:id:zitadel:aud"
  # Optional Go API ListingKit authz examples for local Zitadel deployments.
  TASK_PROCESSOR_LISTINGKIT_ZITADEL_AUTH_REQUIRED: "1"
  TASK_PROCESSOR_LISTINGKIT_ZITADEL_AUTHZ_REQUIRED: "1"
  LISTINGKIT_ZITADEL_ALLOWED_ROLES: "listingkit_admin,listingkit_operator,listingkit_viewer,platform_admin"
