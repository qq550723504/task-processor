apiVersion: v1
kind: Service
metadata:
  name: zitadel-postgres16
  namespace: zitadel
  labels:
    app: zitadel-postgres16
spec:
  type: ClusterIP
  selector:
    app: zitadel-postgres16
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: zitadel-postgres16-hl
  namespace: zitadel
  labels:
    app: zitadel-postgres16
spec:
  clusterIP: None
  selector:
    app: zitadel-postgres16
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
