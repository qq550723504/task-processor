apiVersion: apps/v1
kind: Deployment
metadata:
  name: amazon-listing
  namespace: task-processor
  labels:
    app: amazon-listing
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: amazon-listing
  template:
    metadata:
      labels:
        app: amazon-listing
    spec:
      containers:
        - name: amazon-listing
          image: xuwei190/task-processor-amazon-listing:8324377
          imagePullPolicy: IfNotPresent
          command: ["/app/listing-service"]
          args:
            - -config
            - /app/config/config-amazon-listing.yaml
            - -log-level
            - info
          ports:
            - name: http
              containerPort: 8081
            - name: metrics
              containerPort: 8082
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: TASK_PROCESSOR_ENV
              value: prod
            - name: TASK_PROCESSOR_BROWSER_HEADLESS
              value: "true"
            - name: TASK_PROCESSOR_BROWSER_PATH
              value: /usr/bin/chromium
            - name: TASK_PROCESSOR_RABBITMQ_NODE_ROLE
              value: task
            - name: TASK_PROCESSOR_RABBITMQ_NODE_HEALTH_CHECK_PORT
              value: "8081"
            - name: TASK_PROCESSOR_RABBITMQ_NODE_METRICS_PORT
              value: "8082"
          envFrom:
            - secretRef:
                name: amazon-listing-secret
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 18
          volumeMounts:
            - name: app-config
              mountPath: /app/config/config-amazon-listing.yaml
              subPath: config-amazon-listing.yaml
            - name: app-tmp
              mountPath: /app/tmp
            - name: app-logs
              mountPath: /app/logs
      volumes:
        - name: app-config
          configMap:
            name: amazon-listing-config
        - name: app-tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}
