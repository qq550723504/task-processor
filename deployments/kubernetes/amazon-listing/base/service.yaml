apiVersion: v1
kind: Service
metadata:
  name: amazon-listing
  namespace: task-processor
  labels:
    app: amazon-listing
spec:
  selector:
    app: amazon-listing
  ports:
    - name: http
      port: 8081
      targetPort: http
    - name: metrics
      port: 8082
      targetPort: metrics
  type: ClusterIP
