apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: amazon-crawler-api
  namespace: monitoring
  labels:
    app.kubernetes.io/name: amazon-crawler-api
    app.kubernetes.io/part-of: task-processor
spec:
  namespaceSelector:
    matchNames:
      - task-processor
  selector:
    matchLabels:
      app: amazon-crawler-api
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: false
      relabelings:
        - action: replace
          sourceLabels:
            - __meta_kubernetes_namespace
          targetLabel: namespace
        - action: replace
          sourceLabels:
            - __meta_kubernetes_namespace
          targetLabel: kubernetes_namespace
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_name
          targetLabel: pod
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_name
          targetLabel: kubernetes_pod_name
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: node
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: kubernetes_node
