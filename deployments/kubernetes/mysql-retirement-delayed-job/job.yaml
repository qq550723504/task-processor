apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-retirement-delayed-cleanup
  namespace: yudao-cloud
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: mysql-retirement-cleaner
      restartPolicy: Never
      containers:
        - name: cleanup
          image: bitnami/kubectl:1.33.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              TARGET_TS=$(date -d '2026-04-11 00:00:00 +0800' +%s)
              NOW_TS=$(date +%s)
              WAIT_SECONDS=$((TARGET_TS - NOW_TS))

              if [ "$WAIT_SECONDS" -gt 0 ]; then
                echo "Waiting ${WAIT_SECONDS}s until 2026-04-11 00:00:00 +08:00"
                sleep "$WAIT_SECONDS"
              else
                echo "Target time already passed, running cleanup immediately"
              fi

              kubectl -n yudao-cloud delete deployment/mysql --ignore-not-found=true
              kubectl -n yudao-cloud delete service/mysql --ignore-not-found=true
              kubectl -n yudao-cloud delete configmap/mysql-config configmap/mysql-daily-sql --ignore-not-found=true
              kubectl -n yudao-cloud delete pvc/mysql-pvc --ignore-not-found=true
