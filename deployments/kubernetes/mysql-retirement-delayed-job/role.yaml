apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mysql-retirement-cleaner
  namespace: yudao-cloud
rules:
  - apiGroups: [""]
    resources:
      - services
      - configmaps
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - delete
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs:
      - get
      - list
      - delete
