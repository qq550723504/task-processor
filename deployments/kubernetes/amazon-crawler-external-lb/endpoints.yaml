apiVersion: v1
kind: Endpoints
metadata:
  name: amazon-crawler-external-lb  # 必须与 Service 同名
  namespace: task-processor
  labels:
    app: amazon-crawler-api
    component: external-lb
subsets:
  - addresses:
      # ⚠️ 这里只能填写纯 IP，不能带端口；端口统一在下面 ports.port 配置
      - ip: 43.130.46.73   # 爬虫服务器 1
      - ip: 170.106.197.86   # 爬虫服务器 2
      - ip: 43.166.247.253   # 爬虫服务器 3
      # 新增服务器时继续添加 - ip: xxx.xxx.xxx.xxx
    ports:
      - name: http
        port: 8080
        protocol: TCP