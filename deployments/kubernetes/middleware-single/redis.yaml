apiVersion: v1
kind: Service
metadata:
  name: redis-master
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-metrics
  labels:
    app: redis
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "9121"
    prometheus.io/scrape: "true"
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: metrics
      port: 9121
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      initContainers:
        - name: init-redis-config
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              cp /config/redis.conf /workdir/redis.conf
              {
                echo "requirepass ${REDIS_PASSWORD}"
                echo "masterauth ${REDIS_PASSWORD}"
              } >> /workdir/redis.conf
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-password
          volumeMounts:
            - name: redis-config
              mountPath: /config
            - name: redis-config-workdir
              mountPath: /workdir
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - exec redis-server /etc/redis/redis.conf
          env:
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-password
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - redis-cli -h 127.0.0.1 -p 6379 ping | grep PONG
            failureThreshold: 24
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - redis-cli -h 127.0.0.1 -p 6379 ping | grep PONG
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - redis-cli -h 127.0.0.1 -p 6379 ping | grep PONG
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - redis-cli -h 127.0.0.1 -p 6379 shutdown nosave || true
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config-workdir
              mountPath: /etc/redis
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.67.0
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_ADDR
              value: redis://127.0.0.1:6379
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-password
          ports:
            - name: metrics
              containerPort: 9121
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
      volumes:
        - name: redis-data
          hostPath:
            path: /data/redis
            type: DirectoryOrCreate
        - name: redis-config
          configMap:
            name: redis-config
        - name: redis-config-workdir
          emptyDir: {}
