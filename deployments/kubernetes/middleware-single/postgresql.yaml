apiVersion: v1
kind: Service
metadata:
  name: postgresql
  labels:
    app: postgresql
spec:
  type: ClusterIP
  selector:
    app: postgresql
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  labels:
    app: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:13
          imagePullPolicy: IfNotPresent
          args:
            - postgres
            - -c
            - max_connections=200
            - -c
            - shared_buffers=2GB
            - -c
            - effective_cache_size=6GB
            - -c
            - work_mem=15MB
            - -c
            - maintenance_work_mem=512MB
            - -c
            - wal_buffers=64MB
            - -c
            - checkpoint_completion_target=0.9
            - -c
            - min_wal_size=1GB
            - -c
            - max_wal_size=4GB
            - -c
            - random_page_cost=1.1
            - -c
            - effective_io_concurrency=200
            - -c
            - max_worker_processes=8
            - -c
            - max_parallel_workers_per_gather=4
            - -c
            - max_parallel_workers=8
            - -c
            - log_min_duration_statement=1000
            - -c
            - log_timezone=Asia/Shanghai
          env:
            - name: POSTGRES_DB
              value: ruoyi-vue-pro
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-env
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-env
                  key: POSTGRES_PASSWORD
            - name: TZ
              value: Asia/Shanghai
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 6Gi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
              subPath: postgresql
      volumes:
        - name: postgresql-data
          hostPath:
            path: /data/postgresql
            type: DirectoryOrCreate
