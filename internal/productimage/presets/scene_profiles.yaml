    layout_variant: hero_editorial
    visual_mode: editorial
    copy_slots: [headline, subheadline]
    badge_slots: [badge_top_right]
    measurement_slots: [measurement_bottom]
    detail_anchor_slots: [detail_left, detail_right]
    max_copy_lines: 2
    max_badges: 1
    measurement_mode: single_axis
    detail_anchor_mode: dual_anchor
    card_color: { r: 250, g: 247, b: 247, a: 236 }
