default: local_canvas_default
presets:
  - name: local_canvas_default
    group: default
    blur_radius: 14
    background_brightness: -6
    background_contrast: 8
    subject_scale: 0.78
    background_template: background/default-soft
    overlay_template: overlay/neutral-card
    layout_variant: center_card
    visual_mode: catalog
    copy_slots: [headline]
    badge_slots: [badge_top_left]
    measurement_slots: [measurement_bottom]
    detail_anchor_slots: [detail_right]
    max_copy_lines: 2
    max_badges: 1
    measurement_mode: single_axis
    detail_anchor_mode: single_anchor
    card_color: { r: 245, g: 245, b: 245, a: 230 }
  - name: shein_model_editorial
    group: editorial
