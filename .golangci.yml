# golangci-lint 配置文件
# 文档: https://golangci-lint.run/usage/configuration/

run:
  # 超时时间
  timeout: 5m
  
  # 要检查的目录
  tests: true

# 输出配置
output:
  # 输出格式: colored-line-number|line-number|json|tab|checkstyle|code-climate
  formats:
    - format: colored-line-number
  
  # 打印检查的linter名称
  print-issued-lines: true
  print-linter-name: true

# Linters 配置
linters:
  # 禁用所有默认linters
  disable-all: true
  
  # 启用的linters
  enable:
    # 基础检查
    - gosimple      # 简化代码建议
    - govet         # go vet检查
    - ineffassign   # 检查无效的赋值
    - staticcheck   # 静态分析检查
    
    # 代码风格
    - gofmt         # 检查代码格式
    - goimports     # 检查import顺序
    - unconvert     # 检查不必要的类型转换

# Linters 设置
linters-settings:
  govet:
    disable:
      - fieldalignment
    
  gofmt:
    # 简化代码
    simplify: true
    
# Issues 配置
issues:
  # 排除的目录
  exclude-dirs:
    - vendor
    - testdata
    - examples
    - docs
    - scripts
    - deployments
  
  # 排除的文件
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*_test\\.go$"
  
  # 排除的规则
  exclude-rules:
    # 排除某些linters对测试文件的检查
    - path: _test\.go
      linters:
        - errcheck
        - unparam
        
    # 排除examples目录
    - path: examples/
      linters:
        - errcheck

    - linters:
        - staticcheck
      text: "SA1019:"
        
  # 最大问题数量，0表示无限制
  max-issues-per-linter: 0
  max-same-issues: 0
  
  # 显示所有问题
  new: false
  
  # 排除默认的排除规则
  exclude-use-default: false
