# Amazon crawler API standalone configuration
# This file is dedicated to cmd/amazon-crawler-api and keeps crawler runtime
# settings isolated from task/listing worker configuration.

logging:
  level: "INFO"
  format: "text"
  file: ".local/logs/amazon-crawler-api.log"
  split_by_level:
    - levels: [error, fatal, panic]
      file: .local/logs/amazon-crawler-api-error.log
    - levels: [warn]
      file: .local/logs/amazon-crawler-api-warn.log
    - levels: [info]
      file: .local/logs/amazon-crawler-api-info.log
    - levels: [debug, trace]
      file: .local/logs/amazon-crawler-api-debug.log

browser:
  enabled: true
  headless: true
  browserPath: "./.local/chrome/chrome.exe"
  poolSize: 3
  viewportWidth: 1920
  viewportHeight: 1080
  proxyServer: ""

amazon:
  enabled: true
  dataFreshnessDays: 15
  crawlTimeout: 300
  productDedupe:
    lockTTLSeconds: 300
    resultTTLSeconds: 600
    waitTimeoutSeconds: 120
    pollIntervalMillis: 500
  failureArtifacts:
    enabled: true
    directory: "./.local/tmp/amazon-failure-artifacts"
    captureHTML: true
    maxHTMLBytes: 262144
  riskControl:
    captchaRecreateThreshold: 1
    authenticationRecreateThreshold: 1
    browserCrashRecreateThreshold: 1
    timeoutRecreateThreshold: 3
    networkRecreateThreshold: 2
    serverErrorRecreateThreshold: 3
  regionGuard:
    enabled: true
    failureThreshold: 3
    evaluationWindowSeconds: 300
    cooldownSeconds: 180
  qualityControl:
    retryOnValidationFailure: true
    validationRetryMaxAttempts: 2
  proxyPool:
    enabled: false
    strategy: "round_robin" # round_robin or health_aware
    failureCooldownSeconds: 300
    proxyFile: "" # one proxy URL per line, e.g. http://127.0.0.1:31001
    proxies: []
  concurrencyControl:
    enabled: false
    maxInFlight: 12
    maxWaiting: 50
    acquireTimeoutSeconds: 20
    perRegion: {}

  zipcodes:
    us: "10001"
    uk: "SW1A1AA"
    de: "10115"
    fr: "75001"
    it: "00118"
    es: "28001"
    ca: "M5V2T6"
    jp: "1000001"
