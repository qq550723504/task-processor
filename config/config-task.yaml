# Task service standalone configuration
# Dedicated to cmd/task. This keeps task orchestration settings separate from
# crawler API runtime configuration.

logging:
  level: "INFO"
  format: "text"
  file: "logs/task.log"
  split_by_level:
    - levels: [error, fatal, panic]
      file: logs/task-error.log
    - levels: [warn]
      file: logs/task-warn.log
    - levels: [info]
      file: logs/task-info.log
    - levels: [debug, trace]
      file: logs/task-debug.log

processor:
  maxRetries: 3
  timeout: 1800

worker:
  concurrency: 1
  bufferSize: 30
  taskInterval: 50
  maxFetchPerCycle: 2
  queueThreshold: 75
  cleanupInterval: 1800
  taskTimeout: 2400
  stuckTaskThreshold: 1200
  forceCleanupAfter: 3600

management:
  baseURL: "http://getway.linkcloudai.com"
  clientID: "go-listing"
  clientSecret: ""
  tokenURL: "http://getway.linkcloudai.com/admin-api/system/oauth2/token"
  scopes: ["user.read"]
  storeIDs: []

platforms:
  temu:
    enabled: true
    schedulerEnabled: false
  shein:
    enabled: true
    schedulerEnabled: false
  alibaba1688:
    enabled: false

browser:
  enabled: false
  headless: true
  browserPath: "./chrome/chrome.exe"
  poolSize: 1
  viewportWidth: 1920
  viewportHeight: 1080
  proxyServer: ""

amazon:
  enabled: false
  dataFreshnessDays: 15
  crawlTimeout: 300
  remoteAPI:
    enabled: true
    baseURL: "http://amazon-crawler-api:8080"
    timeout: 300
  spapi:
    enabled: false
    region: "us-east-1"
    clientID: ""
    clientSecret: ""
    refreshToken: ""
    defaultFulfillmentType: "FBM"
    defaultCondition: "New"
    defaultMarketplace: "ATVPDKIKX0DER"

prompts:
  dir: "./prompts"
  hotReload: false

updater:
  enabled: false
