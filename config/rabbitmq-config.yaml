# RabbitMQ分布式爬虫系统配置文件

# RabbitMQ配置
rabbitmq:
  url: "amqp://admin:admin123@localhost:5672/"
  reconnect_interval: 5s
  max_reconnect_tries: 10
  consumer:
    prefetch_count: 1
    prefetch_size: 0
    retry_delay: 5s
    max_retries: 3

# 结果上报器配置
result_reporter:
  report_url: "http://localhost:8080/api/task/result"
  node_id: ""  # 自动生成
  timeout: 30s
  buffer_size: 1000
  retry:
    max_retries: 3
    initial_delay: 2s
    max_delay: 30s
    backoff_factor: 2.0
    timeout: 10s

# 负载监控配置
load_monitor:
  update_interval: 30s
  enable_cpu: true
  enable_memory: true
  enable_tasks: true

# 节点配置
node:
  node_id: ""  # 自动生成
  max_concurrency: 5
  health_check_port: 8081
  metrics_port: 8082
  log_level: "info"
  shutdown_timeout: 30s

# 简化的路由配置（不需要租户隔离）
# 路由键格式: {platform}.{priority}
# 例如: amazon.urgent, amazon.high, temu.normal