# 统一开发环境配置
# 支持 TEMU 和 SHEIN 两个平台

# 处理器配置
processor:
  maxRetries: 3
  timeout: 1800  # 增加到30分钟，给复杂处理器足够时间

# Worker配置
worker:
  concurrency: 1           # 并发worker数量
  bufferSize: 30          # 进一步增加队列大小，提供更多缓冲空间
  taskInterval: 50         # 60秒获取一次任务，减少获取频率
  maxFetchPerCycle: 2      # 单次只获取1个任务，更保守的策略
  queueThreshold: 75       # 降低队列使用率阈值，更早触发保护
  cleanupInterval: 1800    # 清理间隔30分钟
  taskTimeout: 2400        # 任务超时40分钟
  stuckTaskThreshold: 1200 # 任务卡住阈值20分钟（之前硬编码5分钟导致过早清理）
  forceCleanupAfter: 3600  # 60分钟强制清理阈值

# OpenAI配置
openai:
  apiKey: "sk-dHmRMt46T7eZxHnm0n97KNlCmtBi08vb7qPqGRwwd0N3HN5U"
  model: "gemini-2.0-flash"
  baseURL: "https://new.yunai.link/v1"
  timeout: 300  # API调用超时5分钟
  
  # 请求池配置 - 更保守的设置
  pool:
    maxConcurrent: 1         # 降低最大并发请求数，减少API压力
    rateLimit: 3.0          # 降低每秒请求数限制，更稳定
    burstLimit: 8.0         # 降低突发请求限制
    
  # 上下文超时配置
  context:
    defaultTimeout: 300     # 默认超时5分钟
    maxTimeout: 900         # 最大超时15分钟
    
  # 重试配置
  retry:
    maxRetries: 3           # 最大重试次数
    retryDelay: 2           # 初始重试延迟（秒）
    backoffMultiplier: 2    # 退避倍数
    
  # 监控配置
  monitoring:
    enabled: true           # 启用性能监控
    healthCheckInterval: 60 # 健康检查间隔（秒）
    circuitBreakerThreshold: 0.7  # 熔断器阈值（成功率低于70%时触发）
    circuitBreakerTimeout: 300    # 熔断器恢复时间（秒）

# 管理API配置
management:
  baseURL: "http://getway.linkcloudai.com"
  clientID: "go-listing"
  clientSecret: "go-listing-secret"
  tokenURL: "http://getway.linkcloudai.com/admin-api/system/oauth2/token"
  scopes: ["user.read"]
  tenantID: "1"  # 租户ID
  #userID: 1      # 用户ID
  storeIDs: [647]  # 店铺ID列表

# 平台配置（按平台组织所有相关配置）
platforms:
  # TEMU 平台配置
  temu:
    enabled: false  # 是否启用TEMU处理器（任务处理）
    # API配置
    api:
      timeout: 120          # API请求超时时间（秒）
      maxTimeout: 180       # 最大超时时间（秒，包含重试）
      retryCount: 3         # 重试次数
      retryInterval: 2      # 重试间隔（秒）
    # 自动定价配置
    autoPricing:
      enabled: true   # 启用自动核价
      interval: 300     # 5分钟
      batchSize: 100
      useAmazonPrice: true  # 是否使用Amazon价格数据进行定价决策
    # 产品同步配置0000000000
    sync:
      enabled: false
      interval: 60      # 同步间隔（分钟），默认1小时
      batchSize: 50     # 批量处理大小
    # 产品监控配置
    monitor:
      enabled: false               # 是否启用TEMU产品监控
      checkInterval: 1440         # 检查间隔（分钟），默认24小时
      batchSize: 100              # 批量处理大小
      enablePriceAlert: true      # 启用价格告警
      enableStockAlert: true      # 启用库存告警
      priceChangeThreshold: 10.0  # 价格变化阈值（百分比）
      stockChangeThreshold: 5     # 库存变化阈值

  # SHEIN 平台配置
  shein:
    enabled: false  # 是否启用SHEIN处理器
    # 自动定价配置
    autoPricing:
      enabled: false
      interval: 300     # 5分钟
      batchSize: 100
    # 产品同步配置
    sync:
      enabled: false
      storeIDs: []      # SHEIN店铺ID列表，为空则使用 management.storeIDs
      interval: 60      # 同步间隔（分钟），默认1小时
      batchSize: 50     # 批量处理大小
    # 产品监控配置
    monitor:
      enabled: false               # 是否启用SHEIN产品监控
      storeIDs: []                # SHEIN店铺ID列表，为空则使用对应平台的sync配置
      checkInterval: 1440         # 检查间隔（分钟），默认24小时
      batchSize: 100              # 批量处理大小
      enablePriceAlert: true      # 启用价格告警
      enableStockAlert: true      # 启用库存告警
      priceChangeThreshold: 10.0  # 价格变化阈值（百分比）
      stockChangeThreshold: 5     # 库存变化阈值

  # 1688 平台配置
  alibaba1688:
    enabled: true   # 是否启用1688处理器
    timeout: 120    # 处理超时时间（秒）
    poolSize: 3     # 浏览器池大小
    
    # 浏览器配置
    browserConfig:
      headless: false
      viewportWidth: 1920
      viewportHeight: 1080
      userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    
    # 随机配置选项
    randomConfig:
      enabled: true
      strategy: "random"
      presetName: "windows_high_end"
      fingerprintStrategy: "random"
      healthCheckEnabled: true
      maxRetries: 3
    
# 浏览器配置（通用）
browser:
  enabled: true
  headless: false  # false=可见模式（便于调试），true=无头模式
  browserPath: "./chrome/chrome.exe"
  poolSize: 3     # 浏览器池大小
  viewportWidth: 1920
  viewportHeight: 1080
  proxyServer: ""
  
  # 随机配置选项
  randomConfig:
    enabled: true  # 启用随机配置
    strategy: "random"  # 配置策略: random, stable, preset, windows
    presetName: "windows_high_end"  # 预设名称（当strategy为preset时使用）
    fingerprintStrategy: "random"  # 指纹策略: random, stable
    healthCheckEnabled: true  # 启用健康检查
    maxRetries: 3  # 最大重试次数

