# 统一开发环境配置
# 支持 TEMU 和 SHEIN 两个平台

# 处理器配置
processor:
  maxRetries: 3
  timeout: 600  # 增加到10分钟，处理图片和变体需要更多时间

# Worker配置
worker:
  concurrency: 1           # 1个并发worker
  bufferSize: 5            # 队列大小5（避免单任务就触发阈值）
  taskInterval: 30         # 30秒获取一次任务
  maxFetchPerCycle: 1      # 单次最多获取1个任务
  queueThreshold: 80       # 队列使用率阈值80%（提高阈值）

# OpenAI配置
openai:
  apiKey: "sk-dHmRMt46T7eZxHnm0n97KNlCmtBi08vb7qPqGRwwd0N3HN5U"
  model: "gemini-2.0-flash"
  baseURL: "https://new.yunai.link/v1"
  timeout: 120

# 管理API配置
management:
  baseURL: "http://getway.linkcloudai.com"
  clientID: "go-listing"
  clientSecret: "go-listing-secret"
  tokenURL: "http://getway.linkcloudai.com/admin-api/system/oauth2/token"
  scopes: ["user.read"]
  tenantID: "1"  # 租户ID
  storeIDs: [617]  # 店铺ID列表

# 自动定价配置
autoPricing:
  # TEMU 平台自动核价
  temu:
    enabled: false
    interval: 300  # 5分钟
    batchSize: 100
  # SHEIN 平台自动核价
  shein:
    enabled: false
    interval: 300  # 5分钟
    batchSize: 100

# Amazon配置
amazon:
  # Amazon 爬虫配置
  enabled: true
  headless: true  # false=可见模式（便于调试），true=无头模式
  browserPath: "./chrome/chrome.exe"
  poolSize: 3
  viewportWidth: 1920
  viewportHeight: 1080
  proxyServer: ""
  dataFreshnessDays: 15  # 数据新鲜度天数，默认15天
  # Amazon SP-API 配置（用于上架）
  # 注意：以下凭证仅为示例，请替换为你自己的真实凭证
  # 获取方法：登录 Amazon Seller Central > 设置 > 用户权限 > 开发者中心
  # 详细步骤：config/amazon-spapi-setup.md
  spapi:
    enabled: true
    region: "us-east-1"
    marketplaceID: "ATVPDKIKX0DER"  # 美国市场ID
    clientID: "amzn1.application-oa2-client.6125bb74233247eea9cb3fbdffb7b564"  # 请填写你的 Client ID
    clientSecret: "amzn1.oa2-cs.v1.ce6327083ebcdb06ee5e7cbb044fbff007be3edc5e756decfc5867bb94c6f57b"  # 请填写你的 Client Secret  
    refreshToken: "Atzr|IwEBIApLq3Y7KlAlMEiN2tSPzH8vgxMTik1IQzZzcXxDuX0Z0ZzuAjudiiG2rPpZNa6yjz-919nJeNcC25-7_9U_W6WkkIsk2dLHuTpUYANNr3c3JA7mLtiFH332Z2bM3ETiJLsO_vfFqECnJclZcLP_R-REvpUDBI0aDoRFva8ZgPJ2v99WiFcDMxtUyYmMfd3RvKPIz6vMBJpxMeJNx9TSX3tuyKu4Vygw47XkAUdE_n8w2z4oH3i7aGTBu_NudxEb9oRZxNc6mhyv72vQ0ufXbHfPgM9sArCvYqNDQr-WIRKac-Zkjezf6DG5R8RHEa9tRBkhyebRPvRQ4LCuXTLeZVnT"  # 请填写你的 Refresh Token
    # AWS凭证（可选，用于API签名，某些操作可能需要）
    awsAccessKeyID: ""    # AWS Access Key ID（可选）
    awsSecretKey: ""      # AWS Secret Access Key（可选）
    defaultFulfillmentType: "FBM"
    defaultCondition: "New"
    
    # 多市场配置（可选，用于切换不同市场）
    defaultMarketplace: "us"
    markets:
      us:
        name: "Amazon.com"
        marketplaceID: "ATVPDKIKX0DER"
        currency: "USD"
        sellerID: "A3G4LX4BVICE56"  # 与主配置保持一致
