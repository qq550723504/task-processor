# 统一开发环境配置
# 支持 TEMU 和 SHEIN 两个平台

# 日志配置
logging:
  level: "DEBUG"  # 设置为 DEBUG 级别以显示详细调试信息
  format: "text"  # text 或 json
  file: "tmp/logs/app.log"
  split_by_level:
    - levels: [error, fatal, panic]
      file: tmp/logs/error.log
    - levels: [warn]
      file: tmp/logs/warn.log
    - levels: [info]
      file: tmp/logs/info.log
    - levels: [debug, trace]
      file: tmp/logs/debug.log

# 处理器配置
processor:
  maxRetries: 3
  timeout: 1800  # 增加到30分钟，给复杂处理器足够时间

# Worker配置
worker:
  concurrency: 1           # 并发worker数量
  bufferSize: 30          # 进一步增加队列大小，提供更多缓冲空间
  taskInterval: 50         # 60秒获取一次任务，减少获取频率
  maxFetchPerCycle: 2      # 单次只获取1个任务，更保守的策略
  queueThreshold: 75       # 降低队列使用率阈值，更早触发保护
  cleanupInterval: 1800    # 清理间隔30分钟
  taskTimeout: 2400        # 任务超时40分钟
  stuckTaskThreshold: 1200 # 任务卡住阈值20分钟（之前硬编码5分钟导致过早清理）
  forceCleanupAfter: 3600  # 60分钟强制清理阈值

# OpenAI配置
openai:
  apiKey: ""
  model: "gemini-2.5-flash"
  baseURL: "https://grsai.dakka.com.cn/v1"
  timeout: 300  # API调用超时5分钟

  # 各阶段命名客户端（key 与代码中 GetClient(name) 对应）
  # 未配置的 key 自动降级到 default
  clients:
    # 图片分析阶段（understanding.go: AnalyzeImage）
    vision:
      model: "gemini-2.5-flash"
      timeout: 120
    # 文本属性提取 / 规格生成（understanding.go, variant.go）
    fast:
      model: "gemini-2.5-flash-lite"
      timeout: 60
    # 质量评分阶段（llm_scorer.go）
    scorer:
      model: "gemini-2.5-flash"
      timeout: 60
    # 图片生成 / 图片编辑阶段（productimage faithful edit + scene generation）
    image:
      apiKey: ""
      baseURL: "https://grsai.dakka.com.cn/v1/draw/nano-banana"
      apiStyle: "nanobanana"
      model: "nano-banana-fast"
      timeout: 300
  
  # 请求池配置 - 更保守的设置

listingkit:
  sheinSubmitDebugDumpDir: ""
  platformAdminUsers: []
  platformAdminRoles: []
  ownerScopeRequired: false
  zitadel:
    issuerURL: ""
    clientID: ""
    clientSecret: ""
    authRequired: false
    authorizationRequired: false
    allowedTenantIDs: []
    allowedUserIDs: []
    allowedUsernames: []
    allowedRoles: []

platforms:
  # TEMU 平台配置
  temu:
    enabled: false          # 是否启用TEMU处理器（处理上架任务）
    schedulerEnabled: false  # 是否启用TEMU调度任务（核价、同步等）
    # 自动核价配置
    autoPricing:
      enabled: false         # 启用自动核价
      interval: 12         # 执行间隔（秒），默认5分钟
      batchSize: 100
    # 产品同步配置
    productSync:
      enabled: false        # 启用产品同步
      interval: 3600        # 执行间隔（秒），默认1小时
    # 库存同步配置
    inventorySync:
      enabled: true        # 启用库存同步
      interval: 1800        # 执行间隔（秒），默认30分钟
    # 活动报名配置
    activityRegistration:
      enabled: false        # 启用活动报名
      interval: 7200        # 执行间隔（秒），默认2小时

  # SHEIN 平台配置
  shein:
    enabled: true            # 是否启用SHEIN处理器（处理上架任务·）
    schedulerEnabled: false   # 是否启用SHEIN调度任务（核价、同步等）
    fetchMode: "local"       # 本地开发默认直接走本地浏览器抓取，避免误走 shared distributed 配置
    # SHEIN 登录态刷新配置；cookie 失效时调用 login 服务重新登录并回写 Redis
    loginService:
      baseURL: "http://localhost:8000"
      sharedKey: ""
      tenantID: "1"
      identifier: "2"
    cookieRedis:
      host: "localhost"
      port: 6379
      password: ""
      db: 9
    # 自动核价配置
    autoPricing:
      enabled: false        # 启用自动核价
      interval: 300         # 执行间隔（秒），默认30分钟
      batchSize: 100
    # ListingKit 上架资料定价配置；关闭时沿用 SDS 成本/价格
    listingPricing:
      enabled: false
      currency: USD
      shippingCost: 0
      fixedMarkup: 0
      markupRate: 0
      commissionRate: 0
      minimumPrice: 0
      roundTo: 0.01
    # 产品同步配置
    productSync:
      enabled: false         # 启用产品同步
      interval: 86400        # 执行间隔（秒），默认24小时
    # 库存同步配置
    inventorySync:
      enabled: false        # 启用库存同步
      interval: 43200        # 执行间隔（秒），默认12小时
    # 活动报名配置
    activityRegistration:
      enabled: false        # 启用活动报名
      interval: 86400        # 执行间隔（秒），默认24小时

  # SDS 登录态刷新配置；cookie/token 失效时会调用 login 服务自动恢复后重试
  sds:
    loginService:
      baseURL: "http://localhost:8000"
      sharedKey: ""
      tenantID: "1"
      identifier: "869"

  # 1688 平台配置
  alibaba1688:
    enabled: false   # 是否启用1688处理器
    timeout: 120    # 处理超时时间（秒）
    poolSize: 3     # 浏览器池大小
    
# 浏览器配置（通用）
browser:
  enabled: true
  headless: false  # false=可见模式（便于调试），true=无头模式
  browserPath: "./.local/chrome/chrome.exe"
  userDataDir: "./.local/tmp/browser-profiles/1688"
  poolSize: 3     # 浏览器池大小
  viewportWidth: 1920
  viewportHeight: 1080
  proxyServer: ""
  randomConfig:
    enabled: true
    strategy: "random"
    presetName: "windows_high_end"
    fingerprintStrategy: "random"
    healthCheckEnabled: true
    maxRetries: 3
    maxUsesPerInstance: 10  # 本地调试环境更保守，便于尽早回收问题实例

# RabbitMQ配置（分布式爬虫）
rabbitmq:
  enabled: false  # 本地调试默认关闭，避免误连分布式爬虫/RabbitMQ
  #url: "amqp://admin:admin123@localhost:5672/"  # 连接到unified的RabbitMQ
  url: "amqp://task-processor:replace-me@rabbitmq.example.internal:5672/"  # 示例值，生产凭据请通过部署环境注入
  reconnectInterval: "5s"   # 重连间隔
  maxReconnectTries: 10  # 最大重连次数
  
  # 消费者配置
  consumer:
    prefetchCount: 5      # 预取消息数量（允许同时处理5条消息）
    prefetchSize: 0       # 预取大小（0表示不限制）
    retryDelay: "5s"         # 重试延迟
    maxRetries: 3         # 最大重试次数
    
    # 队列配置（可为不同队列设置不同的并发度）
    queues:
      # 上架任务队列，默认走平台共享队列；只有启用 useStoreQueues 时才消费 *.store.* 队列
      - name: "amazon.tasks"
        priority: 8
        prefetch: 1
      - name: "temu.tasks"
        priority: 8
        prefetch: 1
      - name: "shein.tasks"
        priority: 8
        prefetch: 1
      - name: "amazon.tasks.store.*"
        priority: 8
        prefetch: 1
      - name: "temu.tasks.store.*"
        priority: 8
        prefetch: 1
      - name: "shein.tasks.store.*"
        priority: 8
        prefetch: 1
      # 爬虫任务队列
      # prefetch = poolSize-1，保留1个实例作为缓冲，避免池耗尽导致饥饿
      - name: "amazon.crawler"
        priority: 8
        prefetch: 4
      - name: "1688.crawler"
        priority: 8
        prefetch: 0
  node:
    role: "hybrid" # task | crawler | hybrid
    useStoreQueues: false
    ownedStores: [836] # 仅在 useStoreQueues=true 时生效
    regions: [US]  # 该节点只处理这三个 region 的爬虫任务
# Amazon配置
amazon:
  # Amazon 爬虫配置
  enabled: true
  dataFreshnessDays: 15  # 数据新鲜度天数，默认15天
  crawlTimeout: 300      # 爬虫超时时间（秒），默认5分钟
  remoteAPI:
    enabled: false
    baseURL: "http://localhost:8080"
    timeout: 300
  
  # Amazon SP-API 配置（用于上架）
  # 注意：以下凭证仅为示例，请替换为你自己的真实凭证
  # 获取方法：登录 Amazon Seller Central > 设置 > 用户权限 > 开发者中心
  # 详细步骤：config/amazon-spapi-setup.md
  spapi:
    enabled: false
    region: "us-east-1"
    clientID: ""  # 请填写你的 Client ID
    clientSecret: ""  # 请填写你的 Client Secret
    refreshToken: ""  # 请填写你的 Refresh Token
    # AWS凭证（可选，用于API签名，某些操作可能需要）
    awsAccessKeyID: ""    # AWS Access Key ID（可选）
    awsSecretKey: ""      # AWS Secret Access Key（可选）
    defaultFulfillmentType: "FBM"
    defaultCondition: "New"
    
    # 多市场配置（可选，用于切换不同市场）
    defaultMarketplace: "ATVPDKIKX0DER"
    markets:
      us:
        name: "Amazon.com"
        marketplaceID: "ATVPDKIKX0DER"
        currency: "USD"
        sellerID: ""  # 与主配置保持一致
        enabled: true
      ca:
        name: "Amazon.ca"
        marketplaceID: "A2EUQ1WTGCTBG2"
        currency: "CAD"
        sellerID: ""
        enabled: true
      mx:
        name: "Amazon.com.mx"
        marketplaceID: "A1AM78C64UM0Y8"
        currency: "MXN"
        sellerID: ""
      br:
        name: "Amazon.com.br"
        marketplaceID: "A2Q3Y263D00KWC"
        currency: "BRL"
        sellerID: ""

# 数据库配置（productenrich-api 使用）
database:
  host: "postgres.example.internal"
  port: 30432 
  user: "root"
  password: "replace-me"
  database: "ruoyi-vue-pro"
  max_connections: 10
  max_idle_connections: 5
  connection_max_lifetime: "1h"  # 1小时

# Redis配置（productenrich-api 使用）
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 10

# 自动更新配置
updater:
  enabled: false  # 开发环境默认禁用自动更新
  updateURL: "https://auto-update-1303159911.cos.ap-shanghai.myqcloud.com/task-processor/version.json"
  checkInterval: 300  # 检查间隔（秒），默认5分钟
  insecureSkipVerify: false  # 是否跳过TLS证书验证（不建议在生产环境启用）

# 水印处理配置
watermark:
  enabled: true  # 启用水印检测与去除
  
  # 检测配置
  detection:
    method: "hybrid"  # traditional/ai/hybrid
    sensitivity: "medium"  # low/medium/high
    regions: ["corner", "edge"]  # corner/center/edge/full
    min_size: 20  # 最小水印尺寸（像素）
    threshold: 0.6  # 检测阈值 0-1
  
  # 去除配置
  removal:
    method: "inpaint"  # inpaint/blur/crop/ai
    quality: "high"  # low/medium/high
    preserve_aspect: true  # 保持宽高比
    auto_crop: true  # 自动裁剪边缘水印
    blur_radius: 5  # 模糊半径
    inpaint_radius: 10  # 修复半径
  
  # AI配置
  ai:
    # GPT-4 Vision / Claude配置
    vision_api:
      enabled: false  # 默认禁用，成本较高
      provider: "openai"  # openai/anthropic
      api_key: ""  # 填写你的API Key
      model: "gpt-4-vision-preview"
      base_url: "https://api.openai.com/v1/chat/completions"
      max_cost: 0.05  # 单张图片最大成本（美元）
    
    # LaMa模型配置
    lama_model:
      enabled: false  # 默认禁用，需要部署LaMa服务
      model_path: ""  # 本地模型路径
      server_url: "http://localhost:8080/inpaint"  # LaMa服务URL
      use_gpu: false
      batch_size: 1
    
    # 商业API配置
    commercial_api:
      enabled: false
      provider: "cloudinary"  # cloudinary/removebg
      api_key: ""
      endpoint: ""
  
  # 性能配置
  performance:
    max_concurrent: 3  # 最大并发数
    timeout: 30  # 超时时间（秒）
    cache_enabled: true  # 启用缓存
    cache_ttl: 3600  # 缓存过期时间（秒）
    max_image_size: 4096  # 最大图片尺寸（像素）
    quality_score: 0.8  # 质量评分阈值


productimage:
  workDir: "./.local/tmp/productimage"
  segmenter:
    enabled: false
    endpoint: ""
    apiKey: ""
    timeout: 45
  whiteBackground:
    enabled: false
    endpoint: ""
    apiKey: ""
    timeout: 45
  scene:
    enabled: false
    endpoint: ""
    apiKey: ""
    timeout: 60
  publisher:
    enabled: true
    provider: "local"
    outputDir: "./.local/tmp/productimage-published"
    publicBase: ""
    s3:
      bucket: "listingkit-assets"
      region: "us-east-1"
      endpoint: "https://oss.shuomiai.com"
      accessKeyID: "replace-me"
      secretAccessKey: "replace-me"
      usePathStyle: true
  lifecycle:
    cleanupTemporaryFiles: true
    reuseExistingAssets: true
