# 统一开发环境配置
# 支持 TEMU 和 SHEIN 两个平台

# 处理器配置
processor:
  maxRetries: 3
  timeout: 600  # 增加到10分钟，处理图片和变体需要更多时间

# Worker配置
worker:
  concurrency: 1           # 1个并发worker
  bufferSize: 5            # 队列大小5（避免单任务就触发阈值）
  taskInterval: 30         # 30秒获取一次任务
  maxFetchPerCycle: 1      # 单次最多获取1个任务
  queueThreshold: 80       # 队列使用率阈值80%（提高阈值）

# OpenAI配置
openai:
  apiKey: "sk-dHmRMt46T7eZxHnm0n97KNlCmtBi08vb7qPqGRwwd0N3HN5U"
  model: "gemini-2.0-flash"
  baseURL: "https://new.yunai.link/v1"
  timeout: 120

# 管理API配置
management:
  baseURL: "http://getway.linkcloudai.com"
  clientID: "go-listing"
  clientSecret: "go-listing-secret"
  tokenURL: "http://getway.linkcloudai.com/admin-api/system/oauth2/token"
  scopes: ["user.read"]
  tenantID: "1"  # 租户ID
  storeIDs: [617]  # 店铺ID列表

# 自动定价配置
autoPricing:
  # TEMU 平台自动核价
  temu:
    enabled: false
    interval: 300  # 5分钟
    batchSize: 100
  # SHEIN 平台自动核价
  shein:
    enabled: false
    interval: 300  # 5分钟
    batchSize: 100

# Amazon配置
amazon:
  # Amazon 爬虫配置
  enabled: true
  headless: true  # false=可见模式（便于调试），true=无头模式
  browserPath: "./chrome/chrome.exe"
  poolSize: 3
  viewportWidth: 1920
  viewportHeight: 1080
  proxyServer: ""
  dataFreshnessDays: 15  # 数据新鲜度天数，默认15天
  # Amazon SP-API 配置（用于上架）
  # 注意：以下凭证仅为示例，请替换为你自己的真实凭证
  # 获取方法：登录 Amazon Seller Central > 设置 > 用户权限 > 开发者中心
  # 详细步骤：config/amazon-spapi-setup.md
  spapi:
    enabled: true
    sandbox: false  # 沙盒模式：true=测试环境（推荐），false=生产环境
    region: "us-east-1"
    marketplaceID: "A2X1Q3OH6LFU9X"
    clientID: "amzn1.application-oa2-client.6125bb74233247eea9cb3fbdffb7b564"  # 请填写你的 Client ID
    clientSecret: "amzn1.oa2-cs.v1.fa0b6d83fbff90cc2b8a3d042fd894aaa9f980e2072cd749545a7058fc8701f9"  # 请填写你的 Client Secret  
    refreshToken: "Atzr|IwEBIHcqqqZdMXO747khLVVt_oidUIdjYT9kdeXkXjMp5ZoyT40CSXJX781zo9Bsz4PipQvuoRjwVYtutKNorTDb3DaRrZMicVVr92WMKSDshpKDYvlWDYC_OO0r9Dfp6sIHGp8ZraUl8QAn0k2qsjTb2jjQXaE-_uLeEFiE3BBxOqGkx5Rx94DjHJbkN446ewnB2cFelZ61GXB3uxylgXw7svBoZ94I_nzHDHQnuBYdLXqQIHvZwjtJ5YbvFw22xT_RazVl-R3-Gj_st98ncljHvaOD1xn1LrWc7DRdMJZjeECsScJXwxEtNaZHdMaTb_DQdmiSUHNtPBjvoDOr5eDuOT4W"  # 请填写你的 Refresh Token
    defaultFulfillmentType: "FBM"
    defaultCondition: "New"

# 自动更新配置
updater:
  enabled: false  # 开发环境默认禁用自动更新
  updateURL: "https://auto-update-1303159911.cos.ap-shanghai.myqcloud.com/task-processor/version.json"
  checkInterval: 300  # 检查间隔（秒），默认5分钟
  insecureSkipVerify: false  # 是否跳过TLS证书验证（不建议在生产环境启用）

# 产品同步配置
sync:
  enabled: true  # 是否启用产品同步功能
  storeIDs: []    # 可选：指定需要同步的店铺ID，如果为空则使用 management.storeIDs

# 产品监控配置
monitor:
  enabled: true  # 是否启用产品监控功能
  storeIDs: []    # 可选：指定需要监控的店铺ID，如果为空则使用 sync.storeIDs 或 management.storeIDs
  checkInterval: 1440  # 检查间隔（分钟），默认24小时
  batchSize: 100  # 批量处理大小