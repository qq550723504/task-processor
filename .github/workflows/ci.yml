name: ListingKit CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/ci.yml"
      - "cmd/product-listing-api/**"
      - "config/**"
      - "deployments/docker/Dockerfile.product-listing-api"
      - "deployments/docker/Dockerfile.listingkit-ui"
      - "deployments/kubernetes/listingkit-workbench/base/**"
      - "deployments/kubernetes/listingkit-workbench/overlays/prod/**"
      - "go.mod"
      - "go.sum"
      - "internal/app/httpapi/**"
      - "internal/crawler/alibaba1688/**"
      - "internal/listingkit/**"
      - "internal/listingadmin/**"
      - "internal/promptmgmt/**"
      - "internal/listingsubscription/**"
      - "prompts/**"
      - "web/listingkit-ui/**"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "cmd/product-listing-api/**"
      - "config/**"
      - "deployments/docker/Dockerfile.product-listing-api"
      - "deployments/docker/Dockerfile.listingkit-ui"
      - "deployments/kubernetes/listingkit-workbench/base/**"
      - "deployments/kubernetes/listingkit-workbench/overlays/prod/**"
      - "go.mod"
      - "go.sum"
      - "internal/app/httpapi/**"
      - "internal/crawler/alibaba1688/**"
      - "internal/listingkit/**"
      - "internal/listingadmin/**"
      - "internal/promptmgmt/**"
      - "internal/listingsubscription/**"
      - "prompts/**"
      - "web/listingkit-ui/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "22"

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run ListingKit backend tests
        run: |
          go test ./cmd/product-listing-api ./internal/app/httpapi ./internal/crawler/alibaba1688 ./internal/listingkit ./internal/listingadmin ./internal/promptmgmt ./internal/listingsubscription

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/listingkit-ui
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/listingkit-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build
