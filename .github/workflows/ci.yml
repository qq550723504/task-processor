name: ListingKit CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/ci.yml"
      - "cmd/product-listing-api/**"
      - "cmd/**"
      - "config/**"
      - "deployments/docker/Dockerfile.product-listing-api"
      - "deployments/docker/Dockerfile.listingkit-ui"
      - "deployments/kubernetes/listingkit-workbench/base/**"
      - "deployments/kubernetes/listingkit-workbench/overlays/prod/**"
      - "go.mod"
      - "go.sum"
      - "internal/app/httpapi/**"
      - "internal/**"
      - "internal/crawler/alibaba1688/**"
      - "internal/listingkit/**"
      - "internal/listingadmin/**"
      - "internal/promptmgmt/**"
      - "internal/listingsubscription/**"
      - "prompts/**"
      - "tests/**"
      - "web/listingkit-ui/**"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "cmd/product-listing-api/**"
      - "cmd/**"
      - "config/**"
      - "deployments/docker/Dockerfile.product-listing-api"
      - "deployments/docker/Dockerfile.listingkit-ui"
      - "deployments/kubernetes/listingkit-workbench/base/**"
      - "deployments/kubernetes/listingkit-workbench/overlays/prod/**"
      - "go.mod"
      - "go.sum"
      - "internal/app/httpapi/**"
      - "internal/**"
      - "internal/crawler/alibaba1688/**"
      - "internal/listingkit/**"
      - "internal/listingadmin/**"
      - "internal/promptmgmt/**"
      - "internal/listingsubscription/**"
      - "prompts/**"
      - "tests/**"
      - "web/listingkit-ui/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "22"

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run backend tests
        run: |
          go test ./... -count=1

      - name: Run listing control-plane race tests
        run: |
          go test -race ./internal/app/runtime/listingcontrol -run TestControlPlaneService -count=1

      - name: Build runtime commands
        run: |
          go build ./cmd/listing-control-plane
          go build ./cmd/shein-listing

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/listingkit-ui
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/listingkit-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

  notify:
    name: WeCom Notification
    needs:
      - backend
      - frontend
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
      BACKEND_RESULT: ${{ needs.backend.result }}
      FRONTEND_RESULT: ${{ needs.frontend.result }}
      CI_BRANCH: ${{ github.head_ref || github.ref_name }}
      CI_EVENT: ${{ github.event_name }}
      CI_ACTOR: ${{ github.actor }}
      CI_SHA: ${{ github.sha }}
      CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Send CI result to WeCom
        shell: bash
        run: |
          if [[ -z "$WECOM_WEBHOOK_URL" ]]; then
            echo "::warning::WECOM_WEBHOOK_URL is not configured; notification skipped."
            exit 0
          fi

          python3 <<'PY'
          import json
          import os
          import urllib.request

          backend = os.environ.get("BACKEND_RESULT", "unknown")
          frontend = os.environ.get("FRONTEND_RESULT", "unknown")
          results = [backend, frontend]

          if all(result == "success" for result in results):
              overall = "✅ 成功"
          elif any(result == "failure" for result in results):
              overall = "❌ 失败"
          elif any(result == "cancelled" for result in results):
              overall = "⏹️ 已取消"
          else:
              overall = "⚠️ 未完整执行"

          sha = os.environ.get("CI_SHA", "")
          content = "\n".join([
              f"### ListingKit CI：{overall}",
              f"> 仓库：`{os.environ.get('REPOSITORY', '-')}`",
              f"> 分支：`{os.environ.get('CI_BRANCH') or '-'}`",
              f"> 事件：`{os.environ.get('CI_EVENT') or '-'}`",
              f"> Backend：`{backend}`",
              f"> Frontend：`{frontend}`",
              f"> 提交：`{sha[:7] if sha else '-'}`",
              f"> 触发者：`{os.environ.get('CI_ACTOR') or '-'}`",
              f"> [查看 GitHub Actions 详情]({os.environ.get('CI_RUN_URL', '')})",
          ])

          payload = {
              "msgtype": "markdown",
              "markdown": {
                  "content": content,
              },
          }

          request = urllib.request.Request(
              os.environ["WECOM_WEBHOOK_URL"],
              data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          with urllib.request.urlopen(request, timeout=15) as response:
              body = response.read().decode("utf-8")

          result = json.loads(body)
          if result.get("errcode") != 0:
              raise RuntimeError(f"WeCom notification failed: {body}")

          print("WeCom notification sent successfully.")
          PY
