name: ListingKit UI Deploy

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "UI source commit or ref. Defaults to the workflow commit."
        required: false
        type: string
      image_tag:
        description: "Optional UI image tag. Defaults to the first eight source-ref characters."
        required: false
        type: string
      publish_latest:
        description: "Also push the floating latest UI image tag."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: listingkit-deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: xuwei190
  UI_IMAGE_NAME: task-processor-listingkit-ui
  K8S_NAMESPACE: task-processor

jobs:
  prepare:
    name: Prepare UI Release Metadata
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.meta.outputs.source_ref }}
      ui_image: ${{ steps.meta.outputs.ui_image }}
      ui_tags: ${{ steps.meta.outputs.ui_tags }}
    steps:
      - name: Resolve UI source and image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          source_ref="${{ inputs.source_ref }}"
          if [[ -z "$source_ref" ]]; then
            source_ref="${GITHUB_SHA}"
          fi
          tag="${{ inputs.image_tag }}"
          if [[ -z "$tag" ]]; then
            tag="${source_ref:0:8}"
          fi
          ui_image="${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.UI_IMAGE_NAME }}:$tag"
          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"
          echo "ui_image=$ui_image" >> "$GITHUB_OUTPUT"
          {
            echo "ui_tags<<EOF"
            echo "$ui_image"
            if [[ "${{ inputs.publish_latest }}" == "true" ]]; then
              echo "${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.UI_IMAGE_NAME }}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-ui:
    name: Build UI Image
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout UI source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile.listingkit-ui
          push: true
          tags: ${{ needs.prepare.outputs.ui_tags }}
          cache-from: type=gha,scope=listingkit-ui
          cache-to: type=gha,mode=max,scope=listingkit-ui

  deploy-ui:
    name: Deploy ListingKit UI
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-ui
    environment:
      name: production
      url: https://pod.shuomiai.com
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Write kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          printf '%s' '${{ secrets.KUBE_CONFIG }}' > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Update only the UI deployment image
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} set image deployment/listingkit-ui listingkit-ui=${{ needs.prepare.outputs.ui_image }}

      - name: Wait for UI rollout
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deployment/listingkit-ui --timeout=5m

      - name: Show running UI image
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} get deployment listingkit-ui -o jsonpath='{.metadata.name}{" => "}{range .spec.template.spec.containers[*]}{.image}{end}{"\\n"}'
